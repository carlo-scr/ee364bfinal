# Tiny smoke-test config: 2 seeds, short training, small data.
# Used only to verify the unified CLI/cache pipeline works.
#
# Run:  python scripts/run.py --config configs/smoke.yaml --output-root /tmp/inverse_opf_smoke

experiment: methods_comparison
run_name: smoke
seeds: [0, 1]

network:
  n_buses: 6
  n_lines: 8

data:
  n_train: 40
  n_val: 20
  n_test: 30
  obs_noise: 0.3

model:
  n_strata: 4

training:
  steps: 30
  lr: 0.05
  early_stopping_patience: 0

forward:
  physics: transport
