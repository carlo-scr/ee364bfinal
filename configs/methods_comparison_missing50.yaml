# Missing-data ablation: keep only 50% of training samples (chosen
# uniformly at random per seed).  Same headline config otherwise.
#
# Used to show that the differentiable estimator degrades gracefully
# under reduced observation count.

experiment: methods_comparison
run_name: methods_comparison_missing50
seeds: [0, 1, 2, 3, 4]

network:
  n_buses: 10
  n_lines: 14

data:
  n_train: 200          # before thinning
  n_val: 100
  n_test: 200
  missing_frac: 0.5     # drop half of training rows
  obs_noise: 0.5

model:
  n_strata: 24

training:
  steps: 600
  lr: 0.05
  loss: huber
  lr_schedule: cosine
  early_stopping_patience: 120
  restore_best: true

forward:
  physics: transport
